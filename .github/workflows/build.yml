name: Build SeaChat APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    env: 
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Build Android APK
        run: eas build --platform android --profile preview --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_BUILD_SKIP_LOCKFILE_CHECK: 1

      - name: Show APK Link
        run: |
          BUILD_URL=$(eas build:list --platform=android --limit=1 --json --non-interactive | jq -r '.[0].artifacts.buildUrl')
          echo "### ✅ APK جاهز للتحميل" >> $GITHUB_STEP_SUMMARY
          echo "[$BUILD_URL]($BUILD_URL)" >> $GITHUB_STEP_SUMMARY
